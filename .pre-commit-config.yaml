repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: bash -c 'echo "$@" | xargs gofmt -w' --
        types: [go]
        pass_filenames: true

      - id: go-vet
        name: go vet
        language: system
        entry: go vet ./...
        types: [go]
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run --fix ./...
        types: [go]
        pass_filenames: false
